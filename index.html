<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOLTY — AI Team Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f172a; color: #e2e8f0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Pulse animations */
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
    }
    @keyframes pulse-yellow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); }
      50% { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0); }
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
    }
    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      50% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
    }
    .dot-active { animation: pulse-green 2s infinite; background: #22c55e; }
    .dot-waiting { animation: pulse-yellow 2s infinite; background: #eab308; }
    .dot-inactive { animation: pulse-red 2s infinite; background: #ef4444; }
    .dot-working { animation: pulse-blue 2s infinite; background: #3b82f6; }

    /* Card hover */
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
      border-color: rgba(99, 102, 241, 0.4);
    }

    /* Fade in animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    /* Shimmer for loading */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.05) 50%, transparent 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    /* Glow effect */
    .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.15); }
    .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
    .glow-yellow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); }
    .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); }

    /* Timeline line */
    .timeline-item { position: relative; padding-left: 24px; }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 24px;
      bottom: -8px;
      width: 1px;
      background: #334155;
    }
    .timeline-item:last-child::before { display: none; }

    /* Progress bar animation */
    @keyframes progressFill {
      from { width: 0; }
    }
    .progress-animated { animation: progressFill 1s ease-out; }

    /* Sparkline canvas */
    .sparkline-container { position: relative; height: 40px; }

    /* Counter animation */
    .counter { transition: all 0.5s ease-out; }

    /* Gradient border */
    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #6366f1);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .gradient-border:hover::before { opacity: 1; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- Header -->
    <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 animate-fade-in" style="animation-delay: 0.1s">
      <div class="flex items-center gap-4 mb-4 sm:mb-0">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-indigo-500/25">M</div>
        <div>
          <h1 class="text-2xl font-bold tracking-tight">
            <span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">MOLTY</span>
            <span class="text-slate-400 font-normal text-lg ml-2">AI Team Dashboard</span>
          </h1>
        </div>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div id="active-count" class="px-3 py-1.5 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-medium"></div>
        <div id="clock" class="text-slate-400 font-mono"></div>
      </div>
    </header>

    <!-- Metrics Row -->
    <section id="metrics-section" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 animate-fade-in" style="animation-delay: 0.2s"></section>

    <!-- Agent Cards Grid -->
    <section class="mb-8 animate-fade-in" style="animation-delay: 0.3s">
      <h2 class="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
        <span class="w-1 h-5 bg-indigo-500 rounded-full"></span>
        Agentes de IA
      </h2>
      <div id="agents-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4"></div>
    </section>

    <!-- Two-column layout: Timeline + Chart + Cron -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">

      <!-- Timeline -->
      <section class="lg:col-span-1 animate-fade-in" style="animation-delay: 0.4s">
        <div class="bg-slate-800/50 backdrop-blur rounded-2xl border border-slate-700/50 p-5 h-full">
          <h2 class="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
            <span class="w-1 h-5 bg-purple-500 rounded-full"></span>
            Actividad Reciente
          </h2>
          <div id="timeline-feed" class="space-y-1 max-h-[520px] overflow-y-auto pr-2"></div>
        </div>
      </section>

      <!-- Chart + Cron Jobs -->
      <section class="lg:col-span-2 space-y-6">
        <!-- Token Chart -->
        <div class="animate-fade-in" style="animation-delay: 0.5s">
          <div class="bg-slate-800/50 backdrop-blur rounded-2xl border border-slate-700/50 p-5">
            <h2 class="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
              <span class="w-1 h-5 bg-cyan-500 rounded-full"></span>
              Consumo de Tokens — Últimos 7 días
            </h2>
            <div class="h-64">
              <canvas id="tokenChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Cron Jobs -->
        <div class="animate-fade-in" style="animation-delay: 0.6s">
          <div class="bg-slate-800/50 backdrop-blur rounded-2xl border border-slate-700/50 p-5">
            <h2 class="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
              <span class="w-1 h-5 bg-amber-500 rounded-full"></span>
              Cron Jobs Programados
            </h2>
            <div id="cron-table" class="overflow-x-auto"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- Team Section -->
    <section class="animate-fade-in" style="animation-delay: 0.7s">
      <div class="bg-slate-800/50 backdrop-blur rounded-2xl border border-slate-700/50 p-5">
        <h2 class="text-lg font-semibold text-slate-300 mb-4 flex items-center gap-2">
          <span class="w-1 h-5 bg-rose-500 rounded-full"></span>
          Equipo Humano
        </h2>
        <div id="team-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="mt-8 text-center text-xs text-slate-600 pb-4">
      <span id="last-updated"></span> · Powered by OpenClaw
    </footer>
  </div>

  <script>
    // ─── State ─────────────────────────────────────────
    let data = null;
    let tokenChart = null;

    // ─── Helpers ───────────────────────────────────────
    const statusConfig = {
      active:   { label: 'Activo',    dot: 'dot-active',  badge: 'bg-emerald-500/15 text-emerald-400 border-emerald-500/25', glow: 'glow-green' },
      waiting:  { label: 'En espera', dot: 'dot-waiting', badge: 'bg-yellow-500/15 text-yellow-400 border-yellow-500/25', glow: 'glow-yellow' },
      inactive: { label: 'Inactivo',  dot: 'dot-inactive',badge: 'bg-red-500/15 text-red-400 border-red-500/25', glow: 'glow-red' },
      working:  { label: 'Trabajando',dot: 'dot-working', badge: 'bg-blue-500/15 text-blue-400 border-blue-500/25', glow: 'glow-blue' }
    };

    const teamColors = {
      red:    { bg: 'bg-red-500/15',    text: 'text-red-400',    dot: 'dot-inactive', border: 'border-red-500/25' },
      blue:   { bg: 'bg-blue-500/15',   text: 'text-blue-400',   dot: 'dot-working',  border: 'border-blue-500/25' },
      green:  { bg: 'bg-emerald-500/15',text: 'text-emerald-400',dot: 'dot-active',   border: 'border-emerald-500/25' },
      yellow: { bg: 'bg-yellow-500/15', text: 'text-yellow-400', dot: 'dot-waiting',  border: 'border-yellow-500/25' }
    };

    function timeAgo(isoString) {
      const diff = Date.now() - new Date(isoString).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'ahora';
      if (mins < 60) return `hace ${mins} min`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `hace ${hours}h`;
      return `hace ${Math.floor(hours / 24)}d`;
    }

    function formatNumber(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('es-AR', {
        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
      });
    }

    // ─── Clock ─────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleDateString('es-AR', {
        weekday: 'short', day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }
    updateClock();
    setInterval(updateClock, 60000);

    // ─── Render Functions ──────────────────────────────
    function renderMetrics(metrics) {
      const items = [
        { label: 'Tareas hoy', value: metrics.tasksToday, icon: '✅', color: 'from-emerald-500/20 to-emerald-600/5' },
        { label: 'Tokens hoy', value: formatNumber(metrics.tokensToday), icon: '🔤', color: 'from-cyan-500/20 to-cyan-600/5', sparkline: true },
        { label: 'Reportes semana', value: metrics.reportsThisWeek, icon: '📄', color: 'from-purple-500/20 to-purple-600/5' },
        { label: 'Cron jobs activos', value: metrics.cronJobsActive, icon: '⏰', color: 'from-amber-500/20 to-amber-600/5' }
      ];

      document.getElementById('metrics-section').innerHTML = items.map((item, i) => `
        <div class="card-hover bg-gradient-to-br ${item.color} bg-slate-800/60 backdrop-blur rounded-2xl border border-slate-700/50 p-5">
          <div class="flex items-center justify-between mb-2">
            <span class="text-2xl">${item.icon}</span>
            ${item.sparkline ? '<canvas id="sparkline" class="w-20 h-8"></canvas>' : ''}
          </div>
          <div class="text-3xl font-bold text-white mb-1">${item.value}</div>
          <div class="text-sm text-slate-400">${item.label}</div>
        </div>
      `).join('');

      // Draw sparkline
      if (metrics.tokenSparkline) {
        const canvas = document.getElementById('sparkline');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          canvas.width = 80;
          canvas.height = 32;
          const vals = metrics.tokenSparkline;
          const max = Math.max(...vals);
          const min = Math.min(...vals);
          const range = max - min || 1;
          ctx.strokeStyle = '#06b6d4';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          vals.forEach((v, i) => {
            const x = (i / (vals.length - 1)) * 80;
            const y = 32 - ((v - min) / range) * 28 - 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          });
          ctx.stroke();
        }
      }
    }

    function renderAgents(agents) {
      const activeCount = agents.filter(a => a.status !== 'inactive').length;
      document.getElementById('active-count').textContent = `Agentes activos: ${activeCount}/${agents.length}`;

      document.getElementById('agents-grid').innerHTML = agents.map((agent, i) => {
        const s = statusConfig[agent.status] || statusConfig.active;
        const pct = Math.round((agent.weeklyTasks.completed / agent.weeklyTasks.total) * 100);
        const progressColor = pct === 100 ? 'bg-emerald-500' : pct >= 60 ? 'bg-indigo-500' : 'bg-amber-500';

        return `
          <div class="card-hover gradient-border bg-slate-800/60 backdrop-blur rounded-2xl border border-slate-700/50 p-4 ${s.glow}" style="animation-delay: ${i * 0.05}s">
            <div class="flex items-start justify-between mb-3">
              <div class="flex items-center gap-2">
                <span class="text-2xl">${agent.emoji}</span>
                <div>
                  <h3 class="font-bold text-white text-sm tracking-wide">${agent.name}</h3>
                  <p class="text-xs text-slate-500">${agent.role}</p>
                </div>
              </div>
              <div class="flex items-center gap-1.5">
                <div class="w-2 h-2 rounded-full ${s.dot}"></div>
                <span class="text-[10px] font-medium ${s.badge.split(' ')[1]}">${s.label}</span>
              </div>
            </div>

            <p class="text-xs text-slate-400 mb-2 line-clamp-2 leading-relaxed">${agent.lastTask}</p>

            <div class="flex items-center justify-between text-[10px] text-slate-500 mb-3">
              <span>${timeAgo(agent.lastActivity)}</span>
              <span class="font-mono">${agent.channel}</span>
            </div>

            <div class="space-y-1">
              <div class="flex justify-between text-[10px]">
                <span class="text-slate-500">Progreso semanal</span>
                <span class="text-slate-400 font-medium">${agent.weeklyTasks.completed}/${agent.weeklyTasks.total}</span>
              </div>
              <div class="h-1.5 bg-slate-700/50 rounded-full overflow-hidden">
                <div class="h-full ${progressColor} rounded-full progress-animated transition-all" style="width: ${pct}%"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTimeline(timeline) {
      document.getElementById('timeline-feed').innerHTML = timeline.map((item, i) => `
        <div class="timeline-item py-2 group" style="animation-delay: ${i * 0.03}s">
          <div class="absolute left-0 top-3 w-[11px] h-[11px] rounded-full bg-slate-700 border-2 border-slate-600 group-hover:border-indigo-500 transition-colors"></div>
          <div class="flex items-start justify-between gap-2">
            <p class="text-xs text-slate-300 leading-relaxed">
              <span class="mr-1">${item.emoji}</span>
              <span class="font-semibold text-white">${item.agent}</span>
              ${item.action}
            </p>
            <span class="text-[10px] text-slate-500 font-mono whitespace-nowrap">${item.time}</span>
          </div>
        </div>
      `).join('');
    }

    function renderTokenChart(tokenHistory) {
      const ctx = document.getElementById('tokenChart').getContext('2d');

      if (tokenChart) tokenChart.destroy();

      const gradient = ctx.createLinearGradient(0, 0, 0, 256);
      gradient.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
      gradient.addColorStop(1, 'rgba(99, 102, 241, 0.02)');

      tokenChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: tokenHistory.map(d => {
            const date = new Date(d.date + 'T00:00:00');
            return date.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric' });
          }),
          datasets: [{
            data: tokenHistory.map(d => d.tokens),
            backgroundColor: tokenHistory.map((d, i) =>
              i === tokenHistory.length - 1 ? 'rgba(99, 102, 241, 0.8)' : 'rgba(99, 102, 241, 0.35)'
            ),
            borderColor: 'rgba(99, 102, 241, 0.9)',
            borderWidth: 1,
            borderRadius: 6,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#e2e8f0',
              bodyColor: '#94a3b8',
              borderColor: '#334155',
              borderWidth: 1,
              cornerRadius: 8,
              padding: 12,
              callbacks: {
                label: (ctx) => `${formatNumber(ctx.raw)} tokens`
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#64748b', font: { size: 11 } }
            },
            y: {
              grid: { color: 'rgba(51, 65, 85, 0.3)' },
              ticks: {
                color: '#64748b',
                font: { size: 11 },
                callback: (v) => formatNumber(v)
              }
            }
          }
        }
      });
    }

    function renderCronJobs(cronJobs) {
      document.getElementById('cron-table').innerHTML = `
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-slate-500 border-b border-slate-700/50">
              <th class="pb-3 font-medium">Nombre</th>
              <th class="pb-3 font-medium">Frecuencia</th>
              <th class="pb-3 font-medium hidden sm:table-cell">Próxima ejecución</th>
              <th class="pb-3 font-medium text-right">Estado</th>
            </tr>
          </thead>
          <tbody>
            ${cronJobs.map(job => {
              const isActive = job.status === 'active';
              const nextDate = new Date(job.next);
              const nextStr = nextDate.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
              return `
                <tr class="border-b border-slate-700/30 hover:bg-slate-700/20 transition-colors">
                  <td class="py-3 text-slate-300 font-medium">${job.name}</td>
                  <td class="py-3 text-slate-400 font-mono text-xs">${job.frequency}</td>
                  <td class="py-3 text-slate-500 text-xs hidden sm:table-cell">${nextStr}</td>
                  <td class="py-3 text-right">
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[10px] font-medium border ${
                      isActive
                        ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/25'
                        : 'bg-slate-500/10 text-slate-400 border-slate-500/25'
                    }">
                      <span class="w-1.5 h-1.5 rounded-full ${isActive ? 'bg-emerald-400' : 'bg-slate-500'}"></span>
                      ${isActive ? 'Activo' : 'Pausado'}
                    </span>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function renderTeam(team) {
      const statusLabels = { online: 'En línea', offline: 'Desconectado', away: 'Ausente' };
      const statusDots = { online: 'dot-active', offline: 'dot-inactive', away: 'dot-waiting' };

      document.getElementById('team-grid').innerHTML = team.map(member => {
        const c = teamColors[member.color] || teamColors.green;
        return `
          <div class="card-hover bg-slate-700/30 rounded-xl border border-slate-700/50 p-4 text-center">
            <div class="w-12 h-12 rounded-full ${c.bg} ${c.border} border flex items-center justify-center mx-auto mb-2">
              <span class="font-bold ${c.text} text-lg">${member.name.charAt(0)}</span>
            </div>
            <h4 class="font-semibold text-white text-sm">${member.name}</h4>
            <p class="text-[10px] text-slate-500 mb-2">${member.role}</p>
            <div class="flex items-center justify-center gap-1.5">
              <div class="w-1.5 h-1.5 rounded-full ${statusDots[member.status] || 'dot-inactive'}"></div>
              <span class="text-[10px] text-slate-400">${statusLabels[member.status] || member.status}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // ─── Init ──────────────────────────────────────────
    // Embedded data (no fetch needed)
